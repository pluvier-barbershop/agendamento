<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pluvier for Men</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
    }

    iframe {
      width: 100%;
      border: none;
      display: block;
    }
  </style>
</head>

<body>

<iframe
  id="app"
  src="https://billowing-brook-4a5b.qgy4qbdwcn.workers.dev/"
  loading="eager"
  sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-top-navigation">
</iframe>

<script>
function ajustarAltura() {
  const alturaReal = window.innerHeight;
  document.getElementById("app").style.height = alturaReal + "px";
}

ajustarAltura();
window.addEventListener("resize", ajustarAltura);
window.addEventListener("orientationchange", ajustarAltura);
</script>

</body>
</html>
